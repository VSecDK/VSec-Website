<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Discord crops to a circle, so fill the full square -->
  <rect width="512" height="512" fill="#0A1628"/>

  <!-- Shield body (subtle fill) -->
  <path d="M256 48 L448 128 V280 C448 392 368 464 256 488 C144 464 64 392 64 280 V128 Z"
        fill="#00E5A0" fill-opacity="0.08"/>

  <!-- Shield outline -->
  <path d="M256 48 L448 128 V280 C448 392 368 464 256 488 C144 464 64 392 64 280 V128 Z"
        fill="none" stroke="#00E5A0" stroke-width="18" stroke-linejoin="round"/>

  <!-- V letterform -->
  <path d="M176 176 L256 352 L336 176"
        fill="none" stroke="#00E5A0" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
