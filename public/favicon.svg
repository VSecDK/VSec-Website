<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0A1628"/>

  <!-- Shield body (subtle fill) -->
  <path d="M16 3 L28 8 V17.5 C28 24.5 22.5 29 16 30.5 C9.5 29 4 24.5 4 17.5 V8 Z"
        fill="#00E5A0" fill-opacity="0.07"/>

  <!-- Shield outline -->
  <path d="M16 3 L28 8 V17.5 C28 24.5 22.5 29 16 30.5 C9.5 29 4 24.5 4 17.5 V8 Z"
        fill="none" stroke="#00E5A0" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- V letterform (two strokes meeting at bottom) -->
  <path d="M11 11 L16 22 L21 11"
        fill="none" stroke="#00E5A0" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
